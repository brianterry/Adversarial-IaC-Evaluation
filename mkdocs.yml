site_name: Adversarial IaC Benchmark
site_description: Red Team vs Blue Team security evaluation for Infrastructure-as-Code
site_url: https://brianterry.github.io/Adversarial-IaC-Evaluation
repo_url: https://github.com/brianterry/Adversarial-IaC-Evaluation
repo_name: brianterry/Adversarial-IaC-Evaluation

theme:
  name: material
  palette:
    # Dark mode (default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brianterry/Adversarial-IaC-Evaluation

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Quick Start: getting-started/quickstart.md
  - Understanding:
    - How It Works: understanding/architecture.md
    - Key Concepts: understanding/concepts.md
  - CLI Reference:
    - play: cli/play.md
    - game: cli/game.md
    - models: cli/models.md
    - scenarios: cli/scenarios.md
    - red-team: cli/red-team.md
    - blue-team: cli/blue-team.md
    - judge: cli/judge.md
    - experiment: cli/experiment.md
  - Options & Examples:
    - Models & Backends: options/backends.md
    - Difficulties: options/difficulties.md
    - Strategies: options/strategies.md
    - Game Modes: options/modes.md
  - Experiments:
    - Single Game: experiments/single-game.md
    - Batch (YAML): experiments/batch.md
  - Extending:
    - Scenarios: extending/scenarios.md
    - Models: extending/models.md
    - Vulnerabilities: extending/vulnerabilities.md
  - Research:
    - Citation: research/citation.md

